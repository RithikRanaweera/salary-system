# ============================================================
# Search Service - Kubernetes Service
# ClusterIP service for internal access by BFF
# BFF connects via: search-service.app.svc.cluster.local:8084
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: app
  labels:
    app: search-service
    project: techsalary
spec:
  type: ClusterIP
  selector:
    app: search-service
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
