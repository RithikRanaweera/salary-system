version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: techsalary-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       techsalary
      POSTGRES_USER:     techsalary
      POSTGRES_PASSWORD: techsalary_pass
    ports:
      - "5433:5432"    # 5433 on host → avoids clash with any local postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techsalary -d techsalary"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    name: techsalary-postgres-dev-data
